<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍽️ What Should I Eat?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fdf6ec; --card: #fff; --accent: #e8572a; --accent2: #f4a261;
      --text: #2d2d2d; --muted: #888; --green: #2e7d32; --red: #c62828;
      --shadow: 0 8px 32px rgba(0,0,0,0.10); --radius: 18px;
    }
    body { font-family:'Lato',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 16px; gap:24px; }

    /* Auth screens */
    .auth-box { background:var(--card); border-radius:var(--radius); padding:36px; box-shadow:var(--shadow); width:100%; max-width:400px; }
    .auth-box h2 { font-family:'Playfair Display',serif; color:var(--accent); margin-bottom:20px; font-size:1.6rem; text-align:center; }
    .auth-box input { width:100%; padding:12px 16px; border-radius:50px; border:2px solid var(--accent2); font-family:'Lato',sans-serif; font-size:0.95rem; outline:none; margin-bottom:12px; }
    .auth-box input:focus { border-color:var(--accent); }
    .auth-switch { text-align:center; margin-top:14px; font-size:0.9rem; color:var(--muted); }
    .auth-switch a { color:var(--accent); cursor:pointer; font-weight:700; text-decoration:none; }
    .error-msg { color:var(--red); font-size:0.88rem; text-align:center; margin-top:-6px; margin-bottom:8px; min-height:18px; }

    /* Header bar */
    .topbar { width:100%; max-width:640px; display:flex; justify-content:space-between; align-items:center; }
    .topbar h1 { font-family:'Playfair Display',serif; color:var(--accent); font-size:1.8rem; }
    .user-info { font-size:0.9rem; color:var(--muted); display:flex; align-items:center; gap:12px; }
    .badge-role { padding:3px 12px; border-radius:50px; font-size:0.78rem; font-weight:700; text-transform:uppercase; }
    .badge-admin { background:#fde8e8; color:#8b2020; }
    .badge-user  { background:#d4eef5; color:#1a6070; }

    /* Tabs */
    .tabs { display:flex; gap:8px; background:white; padding:6px; border-radius:50px; box-shadow:var(--shadow); flex-wrap:wrap; justify-content:center; }
    .tab-btn { padding:10px 22px; border:none; border-radius:50px; font-family:'Lato',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; background:transparent; color:var(--muted); transition:all 0.2s; }
    .tab-btn.active { background:var(--accent); color:white; }

    /* Sections */
    .section { display:none; width:100%; max-width:560px; flex-direction:column; gap:20px; }
    .section.active { display:flex; }

    /* Cards */
    .card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); }
    .card h2 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--accent); margin-bottom:14px; }

    select, input { padding:10px 16px; border-radius:50px; border:2px solid var(--accent2); background:white; font-size:0.95rem; font-family:'Lato',sans-serif; color:var(--text); outline:none; transition:border-color 0.2s; width:100%; }
    select:focus, input:focus { border-color:var(--accent); }
    .input-row { display:flex; flex-direction:column; gap:10px; }
    .input-half { display:flex; gap:10px; }
    .input-half select, .input-half input { flex:1; }

    .btn { padding:12px 28px; border:none; border-radius:50px; font-family:'Lato',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; transition:transform 0.15s; width:100%; }
    .btn:hover { transform:translateY(-2px); }
    .btn-primary { background:var(--accent); color:white; }
    .btn-success { background:var(--green); color:white; }
    .btn-danger  { background:var(--red);   color:white; }
    .btn-outline { background:white; border:2px solid var(--accent2); color:var(--accent); }

    /* Meal card */
    .meal-card { background:var(--card); border-radius:var(--radius); padding:36px; text-align:center; box-shadow:var(--shadow); animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1); border-top:5px solid var(--accent); }
    @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
    .meal-emoji { font-size:4rem; display:block; margin-bottom:12px; }
    .meal-name  { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:12px; }
    .badges { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
    .badge { padding:4px 14px; border-radius:50px; font-size:0.8rem; font-weight:700; text-transform:uppercase; }
    .badge-veg       { background:#d4f5d4; color:#276827; }
    .badge-nonveg    { background:#fde8e8; color:#8b2020; }
    .badge-healthy   { background:#d4eef5; color:#1a6070; }
    .badge-indulgent { background:#fff0d4; color:#7a4500; }

    /* Table */
    .meal-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    .meal-table th { text-align:left; padding:8px 12px; background:var(--bg); color:var(--muted); font-size:0.8rem; text-transform:uppercase; }
    .meal-table td { padding:10px 12px; border-bottom:1px solid #f0e8e0; }
    .tbl-del { background:none; border:none; cursor:pointer; color:var(--red); font-weight:700; padding:2px 8px; border-radius:6px; }
    .tbl-del:hover { background:#fde8e8; }

    /* Favorites */
    .fav-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .fav-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--bg); border-radius:10px; }
    .fav-remove { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.1rem; }
    .fav-remove:hover { color:var(--red); }
    .no-favs { color:var(--muted); font-size:0.9rem; text-align:center; padding:12px 0; }

    .empty-state { text-align:center; color:var(--muted); padding:24px; }
    .empty-state span { font-size:2.5rem; display:block; margin-bottom:8px; }

    /* Admin-only warning */
    .admin-only { background:#fff5f5; border:1px solid #fca5a5; border-radius:12px; padding:12px 16px; color:#991b1b; font-size:0.88rem; text-align:center; }

    /* Toast */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#2d2d2d; color:white; padding:12px 28px; border-radius:50px; font-size:0.95rem; font-weight:700; box-shadow:0 4px 20px rgba(0,0,0,0.2); transition:transform 0.3s; z-index:999; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }

    .hidden { display:none !important; }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ── -->
  <div id="loginScreen" class="auth-box">
    <h2>🍽️ Welcome Back</h2>
    <input type="email"    id="loginEmail"    placeholder="Email"/>
    <input type="password" id="loginPassword" placeholder="Password"/>
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <div class="auth-switch">No account? <a onclick="showRegister()">Register here</a></div>
    <div style="margin-top:16px; padding:12px; background:var(--bg); border-radius:12px; font-size:0.82rem; color:var(--muted); text-align:center;">
      <strong>Test accounts:</strong><br/>
      Admin: admin@meal.com / admin123<br/>
      User: john@meal.com / user123
    </div>
  </div>

  <!-- ── REGISTER SCREEN ── -->
  <div id="registerScreen" class="auth-box hidden">
    <h2>🍽️ Create Account</h2>
    <input type="text"     id="regName"     placeholder="Your name"/>
    <input type="email"    id="regEmail"    placeholder="Email"/>
    <input type="password" id="regPassword" placeholder="Password"/>
    <div class="error-msg" id="regError"></div>
    <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
    <div class="auth-switch">Already have an account? <a onclick="showLogin()">Login</a></div>
  </div>

  <!-- ── MAIN APP (hidden until login) ── -->
  <div id="mainApp" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:24px;">

    <!-- Top bar -->
    <div class="topbar">
      <h1>🍽️ What Should I Eat?</h1>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <span id="roleDisplay" class="badge-role"></span>
        <button class="btn btn-outline" style="width:auto;padding:8px 18px;font-size:0.85rem;" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabBar">
      <button class="tab-btn active" onclick="showTab('random', this)">🎲 Random</button>
      <button class="tab-btn" onclick="showTab('all', this)">📋 All Meals</button>
      <button class="tab-btn" id="manageTab" onclick="showTab('manage', this)">⚙️ Manage</button>
      <button class="tab-btn" onclick="showTab('favorites', this)">❤️ Favorites</button>
    </div>

    <!-- ── TAB: Random ── -->
    <div class="section active" id="tab-random">
      <div class="card">
        <h2>🎯 Filter Your Meal</h2>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <select id="typeFilter" style="flex:1"><option value="">🍴 All Types</option><option value="veg">🥦 Veg</option><option value="non-veg">🍗 Non-Veg</option></select>
          <select id="categoryFilter" style="flex:1"><option value="">✨ Any Mood</option><option value="healthy">💚 Healthy</option><option value="indulgent">🤤 Indulgent</option></select>
        </div>
      </div>
      <button class="btn btn-primary" style="font-size:1.1rem;padding:16px;" onclick="getRandomMeal()">🎲 Surprise Me!</button>
      <div id="randomResult"></div>
    </div>

    <!-- ── TAB: All Meals ── -->
    <div class="section" id="tab-all">
      <div class="card">
        <h2>📋 All Meals</h2>
        <div id="allMealsContent"><div class="empty-state"><span>⏳</span>Loading...</div></div>
      </div>
    </div>

    <!-- ── TAB: Manage (Admin only) ── -->
    <div class="section" id="tab-manage">
      <div id="adminGate"></div>
    </div>

    <!-- ── TAB: Favorites ── -->
    <div class="section" id="tab-favorites">
      <div class="card">
        <h2>❤️ My Favorites</h2>
        <ul class="fav-list" id="favList">
          <li class="no-favs" id="noFavs">No favorites yet!</li>
        </ul>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BASE = "/api/meals";
    let currentMeal = null;
    let currentUser = null;
    let favorites   = JSON.parse(localStorage.getItem("favMeals") || "[]");

    // ── SHOW/HIDE AUTH SCREENS ──
    function showRegister() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("registerScreen").classList.remove("hidden");
    }

    function showLogin() {
      document.getElementById("registerScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
    }

    // ── LOGIN ──
    async function doLogin() {
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      document.getElementById("loginError").textContent = "";

      if (!email || !password) { document.getElementById("loginError").textContent = "Please fill in all fields"; return; }

      try {
        const res  = await fetch("/api/auth/login", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();

        if (data.status === "success") {
          currentUser = { id: data.id, name: data.name, role: data.role };
          enterApp();
        } else {
          document.getElementById("loginError").textContent = data.message;
        }
      } catch(e) { document.getElementById("loginError").textContent = "Server error"; }
    }

    // ── REGISTER ──
    async function doRegister() {
      const name     = document.getElementById("regName").value.trim();
      const email    = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      document.getElementById("regError").textContent = "";

      if (!name || !email || !password) { document.getElementById("regError").textContent = "Please fill in all fields"; return; }

      try {
        const res  = await fetch("/api/auth/register", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({name, email, password})
        });
        const data = await res.json();

        if (data.status === "success") {
          currentUser = { id: data.id, name: data.name, role: data.role };
          enterApp();
        } else {
          document.getElementById("regError").textContent = data.message;
        }
      } catch(e) { document.getElementById("regError").textContent = "Server error"; }
    }

    // ── ENTER APP ──
    function enterApp() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("registerScreen").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");

      document.getElementById("userNameDisplay").textContent = "Hi, " + currentUser.name;
      const roleEl = document.getElementById("roleDisplay");
      roleEl.textContent = currentUser.role;
      roleEl.className = "badge-role " + (currentUser.role === "admin" ? "badge-admin" : "badge-user");

      // Show/hide manage tab for non-admins
      const manageTab = document.getElementById("manageTab");
      if (currentUser.role !== "admin") manageTab.style.display = "none";
      else manageTab.style.display = "";

      renderAdminPanel();
      renderFavorites();
      loadAllMeals();
    }

    // ── LOGOUT ──
    function logout() {
      currentUser = null;
      document.getElementById("mainApp").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("loginEmail").value = "";
      document.getElementById("loginPassword").value = "";
    }

    // ── TABS ──
    function showTab(name, btn) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("tab-" + name).classList.add("active");
      btn.classList.add("active");
      if (name === "all") loadAllMeals();
    }

    // ── TOAST ──
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }

    // ── GET RANDOM MEAL ──
    async function getRandomMeal() {
      const type     = document.getElementById("typeFilter").value;
      const category = document.getElementById("categoryFilter").value;
      let url = `${BASE}/random`;
      if (type || category) url = `${BASE}/filter?type=${type}&category=${category}`;

      try {
        const res  = await fetch(url);
        const data = await res.json();
        const meal = Array.isArray(data) ? data[0] : data;

        if (!meal) { document.getElementById("randomResult").innerHTML = `<div class="empty-state"><span>😕</span>No meals found</div>`; return; }
        currentMeal = meal;

        document.getElementById("randomResult").innerHTML = `
          <div class="meal-card">
            <span class="meal-emoji">${meal.emoji}</span>
            <div class="meal-name">${meal.name}</div>
            <div class="badges">
              <span class="badge ${meal.type==='veg'?'badge-veg':'badge-nonveg'}">${meal.type==='veg'?'🥦 Veg':'🍗 Non-Veg'}</span>
              <span class="badge ${meal.category==='healthy'?'badge-healthy':'badge-indulgent'}">${meal.category==='healthy'?'💚 Healthy':'🤤 Indulgent'}</span>
            </div>
            <button class="btn btn-outline" style="width:auto;padding:10px 28px;" onclick="addFavorite()">❤️ Save to Favorites</button>
          </div>`;
      } catch(e) { showToast("❌ Server error"); }
    }

    // ── GET ALL MEALS ──
    async function loadAllMeals() {
      try {
        const res   = await fetch(`${BASE}/all`);
        const meals = await res.json();

        const isAdmin = currentUser && currentUser.role === "admin";

        const rows = meals.map(m => `
          <tr>
            <td>${m.id}</td>
            <td>${m.emoji} ${m.name}</td>
            <td><span class="badge ${m.type==='veg'?'badge-veg':'badge-nonveg'}">${m.type}</span></td>
            <td><span class="badge ${m.category==='healthy'?'badge-healthy':'badge-indulgent'}">${m.category}</span></td>
            ${isAdmin ? `<td><button class="tbl-del" onclick="quickDelete('${m.id}')">✕</button></td>` : ''}
          </tr>`).join("");

        document.getElementById("allMealsContent").innerHTML = `
          <table class="meal-table">
            <thead><tr><th>ID</th><th>Meal</th><th>Type</th><th>Category</th>${isAdmin?'<th></th>':''}</tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch(e) { showToast("❌ Could not load meals"); }
    }

    // ── RENDER ADMIN PANEL ──
    function renderAdminPanel() {
      const gate = document.getElementById("adminGate");
      if (!currentUser || currentUser.role !== "admin") {
        gate.innerHTML = `<div class="admin-only">🔒 This section is for admins only.</div>`;
        return;
      }

      gate.innerHTML = `
        <div class="card">
          <h2>➕ Add New Meal (POST)</h2>
          <div class="input-row">
            <input type="text"   id="addName"  placeholder="Meal name e.g. Tacos"/>
            <input type="text"   id="addEmoji" placeholder="Emoji e.g. 🌮"/>
            <div class="input-half">
              <select id="addType"><option value="veg">🥦 Veg</option><option value="non-veg">🍗 Non-Veg</option></select>
              <select id="addCategory"><option value="healthy">💚 Healthy</option><option value="indulgent">🤤 Indulgent</option></select>
            </div>
            <button class="btn btn-success" onclick="addMeal()">➕ Add Meal</button>
          </div>
        </div>

        <div class="card">
          <h2>✏️ Update Meal (PUT)</h2>
          <div class="input-row">
            <input type="number" id="updateId"       placeholder="Meal ID e.g. 3"/>
            <input type="text"   id="updateName"     placeholder="New name"/>
            <input type="text"   id="updateEmoji"    placeholder="New emoji"/>
            <div class="input-half">
              <select id="updateType"><option value="veg">🥦 Veg</option><option value="non-veg">🍗 Non-Veg</option></select>
              <select id="updateCategory"><option value="healthy">💚 Healthy</option><option value="indulgent">🤤 Indulgent</option></select>
            </div>
            <button class="btn btn-outline" onclick="updateMeal()">✏️ Update Meal</button>
          </div>
        </div>

        <div class="card">
          <h2>🗑️ Delete Meal by ID (DELETE)</h2>
          <div class="input-row">
            <input type="number" id="deleteId" placeholder="Meal ID to delete e.g. 5"/>
            <button class="btn btn-danger" onclick="deleteMeal()">🗑️ Delete Meal</button>
          </div>
        </div>`;
    }

    // ── ADD MEAL ──
    async function addMeal() {
      const name     = document.getElementById("addName").value.trim();
      const emoji    = document.getElementById("addEmoji").value.trim();
      const type     = document.getElementById("addType").value;
      const category = document.getElementById("addCategory").value;
      if (!name || !emoji) { showToast("⚠️ Enter name and emoji"); return; }

      try {
        const res  = await fetch(BASE, {
          method: "POST",
          headers: {"Content-Type":"application/json", "X-User-Role": currentUser.role},
          body: JSON.stringify({name, emoji, type, category})
        });
        const meal = await res.json();
        showToast(`✅ "${meal.name}" added!`);
        document.getElementById("addName").value  = "";
        document.getElementById("addEmoji").value = "";
      } catch(e) { showToast("❌ Could not add meal"); }
    }

    // ── UPDATE MEAL ──
    async function updateMeal() {
      const id       = document.getElementById("updateId").value;
      const name     = document.getElementById("updateName").value.trim();
      const emoji    = document.getElementById("updateEmoji").value.trim();
      const type     = document.getElementById("updateType").value;
      const category = document.getElementById("updateCategory").value;
      if (!id || !name || !emoji) { showToast("⚠️ Fill in ID, name and emoji"); return; }

      try {
        const res  = await fetch(`${BASE}/${id}`, {
          method: "PUT",
          headers: {"Content-Type":"application/json", "X-User-Role": currentUser.role},
          body: JSON.stringify({name, emoji, type, category})
        });
        const meal = await res.json();
        showToast(meal ? `✅ Updated to "${meal.name}"!` : `❌ Meal ${id} not found`);
      } catch(e) { showToast("❌ Could not update"); }
    }

    // ── DELETE MEAL ──
    async function deleteMeal() {
      const id = document.getElementById("deleteId").value;
      if (!id) { showToast("⚠️ Enter a meal ID"); return; }
      await doDelete(id);
    }

    async function quickDelete(id) {
      await doDelete(id);
      loadAllMeals();
    }

    async function doDelete(id) {
      try {
        const res  = await fetch(`${BASE}/${id}`, {
          method: "DELETE",
          headers: {"X-User-Role": currentUser.role}
        });
        const data = await res.json();
        showToast(data.message);
        loadAllMeals();
      } catch(e) { showToast("❌ Could not delete"); }
    }

    // ── FAVORITES ──
    function addFavorite() {
      if (!currentMeal) return;
      if (favorites.some(f => f.name === currentMeal.name)) { showToast("Already saved! 😄"); return; }
      favorites.push(currentMeal);
      localStorage.setItem("favMeals", JSON.stringify(favorites));
      renderFavorites();
      showToast(`❤️ "${currentMeal.name}" saved!`);
    }

    function removeFavorite(name) {
      favorites = favorites.filter(f => f.name !== name);
      localStorage.setItem("favMeals", JSON.stringify(favorites));
      renderFavorites();
    }

    function renderFavorites() {
      const list   = document.getElementById("favList");
      const noFavs = document.getElementById("noFavs");
      list.querySelectorAll(".fav-item").forEach(el => el.remove());
      if (favorites.length === 0) { noFavs.style.display = "block"; return; }
      noFavs.style.display = "none";
      favorites.forEach(meal => {
        const li = document.createElement("li");
        li.className = "fav-item";
        li.innerHTML = `<span>${meal.emoji} ${meal.name}</span><button class="fav-remove" onclick="removeFavorite('${meal.name}')">✕</button>`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
